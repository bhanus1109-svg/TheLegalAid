<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalAid Pro - Sign In</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="Sign-in page.css">
</head>
<body>
  <!-- Navbar -->
  <header>
    <div class="logo">⚖️ LegalAid Pro</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Submit Case</a>
      <a href="#">Find Lawyers</a>
      <a href="#">Track Case</a>
      <a href="#">Dashboard</a>
      <a href="#">About Us</a>
      <a href="#">Contact</a>
      <a href="#" class="signin-btn">Sign In</a>
    </nav>
  </header>

  <!-- Sign In Box -->
  <main>
    <div class="signin-box">
      <h2>Sign In to LegalAid Pro</h2>
      <p>Access Your Legal dashboard</p>

      <form>
        <label>Email/ Username</label>
        <input type="text" placeholder="Enter your email or username">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <div class="options">
          <label><input type="checkbox"> Remember Me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Sign In</button>

        <p class="create">Don’t have an account? <a href="#">Create an Account</a></p>
      </form>
    </div>
  </main>
</body>
</html>
